name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: qmux-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: qmux-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/qmux" dist/qmux
          chmod +x dist/qmux
          tar -C dist -czf "${{ matrix.archive }}" qmux

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  checksum:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create checksums file
        shell: bash
        run: |
          cd dist
          find . -type f -name "*.tar.gz" -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v7
        with:
          name: checksums
          path: dist/checksums.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release assets
    needs: checksum
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body_path: .github/release-notes.md
          files: |
            release-assets/**/*.tar.gz
            release-assets/**/checksums.txt
